apiVersion: v1
kind: Service
metadata:
  name: nodejs-app-service
  labels:
    app: nodejs-app
spec:
  type: LoadBalancer        # k3s built-in Klipper ServiceLB handles this automatically
  selector:
    app: nodejs-app
  ports:
    - name: http
      protocol: TCP
      port: 80              # External port → http://<EC2_IP>
      targetPort: 3000      # Container port
